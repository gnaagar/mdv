{% macro theme_toggle_button() %}
<button id="btn-theme-toggle" class="header-btn" title="Switch Theme">
  <svg viewBox="0 0 16 16" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.5">
    <circle cx="8" cy="8" r="6.5" />
    <path d="M8 1.5v13A6.5 6.5 0 0 0 8 1.5z" fill="currentColor" stroke="none" />
  </svg>
</button>
{% endmacro %}

{% macro home_button() %}
<a href="/" class="header-btn" title="Home">
  <svg viewBox="0 0 16 16" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M2 6L8 1.5L14 6v7.5a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1V6z" />
    <path d="M6 14.5V9.5h4v5" />
  </svg>
</a>
{% endmacro %}

{% macro dir_explorer_button() %}
<button id="btn-dir-explorer" class="header-btn" title="Directory Explorer">
  <svg fill="currentColor" viewBox="0 0 16 16" width="18" height="18">
    <path d="M1.75 1A1.75 1.75 0 0 0 0 2.75v10.5C0 14.216.784 15 1.75 15h12.5A1.75 1.75 0 0 0 16 13.25v-8.5A1.75 1.75 0 0 0 14.25 3H7.543L5.903 1.222A.25.25 0 0 0 5.72 1.15H1.75Z"></path>
  </svg>
</button>
{% endmacro %}

{% macro search_button() %}
<button id="btn-search" class="header-btn" title="Search">
  <svg fill="currentColor" viewBox="0 0 16 16" width="18" height="18">
    <path d="M10.68 11.74a6 6 0 0 1-7.922-8.982 6 6 0 0 1 8.982 7.922l3.04 3.04a.749.749 0 0 1-.326 1.275.749.749 0 0 1-.734-.215ZM11.5 7a4.499 4.499 0 1 0-8.997 0A4.499 4.499 0 0 0 11.5 7Z"></path>
  </svg>
</button>
{% endmacro %}
