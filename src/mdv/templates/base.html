<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}mdv{% endblock %}</title>
  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
  <link rel="stylesheet" href="/static/markdown.css">
  {% block styles %}
  {% endblock %}
  <link rel="stylesheet" href="/static/pygments.css">
  <link rel="stylesheet" href="/static/katex/katex-0-16-22.min.css">

</head>
<body class="theme-{{ theme | default('light') }}">
  <script>
    (function() {
      var params = new URLSearchParams(window.location.search);
      var themeParam = params.get('theme');
      var theme = themeParam || localStorage.getItem('theme');
      if (!theme && window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
        theme = 'dark';
      }
      if (theme === 'dark') {
        document.body.classList.remove('theme-light');
        document.body.classList.add('theme-dark');
      } else if (theme === 'light') {
        document.body.classList.remove('theme-dark');
        document.body.classList.add('theme-light');
      }
      // Persist query param choice to localStorage for future visits
      if (themeParam) {
        localStorage.setItem('theme', themeParam);
      }

      // Live listen to system theme changes if no manual preference is set
      if (window.matchMedia) {
        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function(e) {
          if (!localStorage.getItem('theme')) {
            var newTheme = e.matches ? 'dark' : 'light';
            document.body.classList.remove('theme-light', 'theme-dark');
            document.body.classList.add('theme-' + newTheme);
            window.dispatchEvent(new CustomEvent('themeChanged', { detail: { isDark: e.matches } }));
          }
        });
      }
    })();
  </script>
  {% block body %}
  {% endblock %}
  <script src="/static/katex/katex-0-16-22.min.js"></script>
  <script src="/static/katex/auto-render-0-16-22.min.js"></script>
  <script src="/static/mermaid/mermaid.min.js"></script>
  <script src="/static/js/markdown.js"></script>
  {% block scripts %}
  {% endblock %}
</body>
</html>
