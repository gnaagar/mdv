<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}mdv{% endblock %}</title>
  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
  <style>
    @font-face {
      font-family: 'Noto Serif';
      src: url('/static/fonts/NotoSerif-Regular.ttf') format('truetype');
      font-weight: 400;
      font-style: normal;
    }
    @font-face {
      font-family: 'Noto Serif';
      src: url('/static/fonts/NotoSerif-Italic.ttf') format('truetype');
      font-weight: 400;
      font-style: italic;
    }
    @font-face {
      font-family: 'Noto Serif';
      src: url('/static/fonts/NotoSerif-Bold.ttf') format('truetype');
      font-weight: 700;
      font-style: normal;
    }
  </style>
  <link rel="stylesheet" href="/static/markdown.css">
  <link id="theme-stylesheet" rel="stylesheet" href="/static/themes/{{ theme | default('sans') }}.css">
  {% block styles %}
  {% endblock %}
  <link rel="stylesheet" href="/static/pygments.css">
  <link rel="stylesheet" href="/static/katex/katex-0-16-22.min.css">

</head>
<body class="theme-{{ theme | default('sans') }}">
  <script>
    var MDV_THEMES = {{ themes | tojson }};
    (function() {
      var params = new URLSearchParams(window.location.search);
      var themeParam = params.get('theme');
      var preferred = themeParam || localStorage.getItem('theme');
      
      // Migrate old theme names
      if (preferred === 'light' || preferred === 'std-light') preferred = 'sans';
      if (preferred === 'dark' || preferred === 'std-dark') preferred = 'sans-dark';
      
      var active = preferred;
      if (!active || MDV_THEMES.indexOf(active) < 0) {
        active = '{{ theme | default("sans") }}';
      }
      
      document.body.className = 'theme-' + active;
      var isDark = active.indexOf('dark') >= 0;
      document.body.classList.toggle('theme-dark', isDark);
      
      var linkEl = document.getElementById('theme-stylesheet');
      if (linkEl) {
        linkEl.href = '/static/themes/' + active + '.css';
      }
      
      if (themeParam) localStorage.setItem('theme', themeParam);
    })();
  </script>
  {% block body %}
  {% endblock %}
  <script src="/static/katex/katex-0-16-22.min.js"></script>
  <script src="/static/katex/auto-render-0-16-22.min.js"></script>
  <script src="/static/mermaid/mermaid.min.js"></script>
  <script src="/static/js/shared.js"></script>
  <script src="/static/js/markdown.js"></script>
  {% block scripts %}
  {% endblock %}
  <!-- Shared modals -->
  <div id="modal-overlay" class="modal-overlay hidden"></div>
  <div id="theme-modal" class="modal-box hidden">
    <div class="modal-header" style="padding: 0.75rem 1.25rem; border-bottom: 1px solid var(--border-color-light);">
      <span style="font-weight: 600; color: var(--text-color); font-family: 'Noto Serif', serif;">Switch Theme</span>
    </div>
    <div id="theme-list" class="modal-body" style="padding: 0.25rem 0;">
      {% for t in themes %}
      <button class="theme-option" data-theme="{{ t }}">
        <span class="theme-option-name">{{ t.replace('-', ' ').title() }}</span>
        <span class="theme-option-check" style="display:none">✓</span>
      </button>
      {% endfor %}
    </div>
  </div>

  <!-- Directory Explorer Modal -->
  <div id="dir-modal" class="modal-box hidden">
    <div class="modal-header">
      <input type="text" id="dir-filter-input" placeholder="Search files or browse tree..." autocomplete="off">
    </div>
    <div id="dtree-container" class="modal-body">
      <div id="dir-tree-view" class="dir-modal-view"></div>
      <div id="dir-search-view" class="dir-modal-view hidden"></div>
    </div>
  </div>

  <!-- Search Modal -->
  <div id="search-modal" class="modal-box hidden">
    <div class="modal-header">
      <input type="text" id="search-input" placeholder="Search content..." autocomplete="off">
    </div>
    <div id="search-category-bar" class="search-category-bar">
      <button class="search-cat-pill active" data-category="heading" title="Headings">
        <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><path d="M3 2h2v5h6V2h2v12h-2V9H5v5H3V2z"/></svg>
        <span>Headings</span>
      </button>
      <button class="search-cat-pill active" data-category="code" title="Code blocks">
        <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><path d="M4.708 5.578L2.061 8.224l2.647 2.646-.708.708L.293 7.87l.354-.354 3.354-3.354.707.708zm6.584 0l2.647 2.646-2.647 2.646.708.708L15.707 7.87l-.354-.354-3.354-3.354-.707.708zM8.956 3.26l-2 10 .976.194 2-10-.976-.194z"/></svg>
        <span>Code</span>
      </button>
      <button class="search-cat-pill active" data-category="text" title="Paragraphs">
        <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><path d="M2 3h12v1H2V3zm0 3h10v1H2V6zm0 3h12v1H2V9zm0 3h8v1H2v-1z"/></svg>
        <span>Text</span>
      </button>
      <button class="search-cat-pill active" data-category="link" title="Links">
        <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><path d="M7.775 3.275a.75.75 0 001.06 1.06l1.25-1.25a2 2 0 112.83 2.83l-2.5 2.5a2 2 0 01-2.83 0 .75.75 0 00-1.06 1.06 3.5 3.5 0 004.95 0l2.5-2.5a3.5 3.5 0 00-4.95-4.95l-1.25 1.25zm-.025 9.45a.75.75 0 01-1.06-1.06l-1.25 1.25a2 2 0 11-2.83-2.83l2.5-2.5a2 2 0 012.83 0 .75.75 0 001.06-1.06 3.5 3.5 0 00-4.95 0l-2.5 2.5a3.5 3.5 0 004.95 4.95l1.25-1.25z"/></svg>
        <span>Links</span>
      </button>
      <button class="search-cat-pill active" data-category="list" title="Lists">
        <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><path d="M2 4a1 1 0 100-2 1 1 0 000 2zm3.75-1.5a.75.75 0 000 1.5h8.5a.75.75 0 000-1.5h-8.5zm0 5a.75.75 0 000 1.5h8.5a.75.75 0 000-1.5h-8.5zm0 5a.75.75 0 000 1.5h8.5a.75.75 0 000-1.5h-8.5zM3 8a1 1 0 11-2 0 1 1 0 012 0zm-1 6a1 1 0 100-2 1 1 0 000 2z"/></svg>
        <span>Lists</span>
      </button>
      <button id="search-cat-invert" class="search-cat-invert" title="Invert selection">
        <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><path d="M5.22 14.78a.75.75 0 001.06-1.06L4.56 12h8.69a.75.75 0 000-1.5H4.56l1.72-1.72a.75.75 0 00-1.06-1.06l-3 3a.75.75 0 000 1.06l3 3zm5.56-6.5a.75.75 0 11-1.06-1.06l1.72-1.72H2.75a.75.75 0 010-1.5h8.69L9.72 2.28a.75.75 0 011.06-1.06l3 3a.75.75 0 010 1.06l-3 3z"/></svg>
      </button>
    </div>
    <div id="search-results" class="modal-body">
      <div class="search-results-body">
        <ul class="search-column-content" id="search-results-content" style="width: 100%;"></ul>
      </div>
    </div>
  </div>
</body>
</html>
