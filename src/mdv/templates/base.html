<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}mdv{% endblock %}</title>
  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
  <style>
    @font-face {
      font-family: 'Noto Serif';
      src: url('/static/fonts/NotoSerif-Regular.ttf') format('truetype');
      font-weight: 400;
      font-style: normal;
    }
    @font-face {
      font-family: 'Noto Serif';
      src: url('/static/fonts/NotoSerif-Italic.ttf') format('truetype');
      font-weight: 400;
      font-style: italic;
    }
    @font-face {
      font-family: 'Noto Serif';
      src: url('/static/fonts/NotoSerif-Bold.ttf') format('truetype');
      font-weight: 700;
      font-style: normal;
    }
  </style>
  <link rel="stylesheet" href="/static/markdown.css">
  <link id="theme-stylesheet" rel="stylesheet" href="/static/themes/{{ theme | default('std-light') }}.css">
  {% block styles %}
  {% endblock %}
  <link rel="stylesheet" href="/static/pygments.css">
  <link rel="stylesheet" href="/static/katex/katex-0-16-22.min.css">

</head>
<body class="theme-{{ theme | default('std-light') }}">
  <script>
    var MDV_THEMES = {{ themes | tojson }};
    (function() {
      var params = new URLSearchParams(window.location.search);
      var themeParam = params.get('theme');
      var preferred = themeParam || localStorage.getItem('theme');
      
      // Migrate old theme names
      if (preferred === 'light') preferred = 'std-light';
      if (preferred === 'dark') preferred = 'std-dark';
      
      var active = preferred;
      if (!active || MDV_THEMES.indexOf(active) < 0) {
        active = '{{ theme | default("std-light") }}';
      }
      
      document.body.className = 'theme-' + active;
      var isDark = active.indexOf('dark') >= 0;
      document.body.classList.toggle('theme-dark', isDark);
      
      var linkEl = document.getElementById('theme-stylesheet');
      if (linkEl) {
        linkEl.href = '/static/themes/' + active + '.css';
      }
      
      if (themeParam) localStorage.setItem('theme', themeParam);
    })();
  </script>
  {% block body %}
  {% endblock %}
  <script src="/static/katex/katex-0-16-22.min.js"></script>
  <script src="/static/katex/auto-render-0-16-22.min.js"></script>
  <script src="/static/mermaid/mermaid.min.js"></script>
  <script src="/static/js/shared.js"></script>
  <script src="/static/js/markdown.js"></script>
  {% block scripts %}
  {% endblock %}
  <!-- Shared modals -->
  <div id="modal-overlay" class="modal-overlay hidden"></div>
  <div id="theme-modal" class="modal-box hidden">
    <div class="modal-header" style="padding: 0.75rem 1.25rem; border-bottom: 1px solid var(--border-color-light);">
      <span style="font-weight: 600; color: var(--text-color); font-family: 'Noto Serif', serif;">Switch Theme</span>
    </div>
    <div id="theme-list" class="modal-body" style="padding: 0.25rem 0;">
      {% for t in themes %}
      <button class="theme-option" data-theme="{{ t }}">
        <span class="theme-option-name">{{ t.replace('-', ' ').title() }}</span>
        <span class="theme-option-check" style="display:none">✓</span>
      </button>
      {% endfor %}
    </div>
  </div>
</body>
</html>
