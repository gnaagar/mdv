{% extends "base.html" %}

{% block title %}Draw | mdv{% endblock %}

{% block styles %}
<link rel="stylesheet" href="/static/draw.css">
{% endblock %}

{% block body %}
<div class="draw-container">
  <div class="draw-toolbar">
    <div class="tool-group">
      <button class="tool-btn active" data-tool="pointer" title="Select / Move">
        <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3l7.07 16.97 2.51-7.39 7.39-2.51L3 3z"/></svg>
      </button>
      <button class="tool-btn" data-tool="snapshot" title="Snapshot (Select area to copy)">
        <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M3 4v4h4"/><path d="M21 4v4h-4"/><path d="M21 20v-4h-4"/><path d="M3 20v-4h4"/><rect x="7" y="7" width="10" height="10"/></svg>
      </button>
      <button class="tool-btn" data-tool="pencil" title="Pencil (Freehand)">
        <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19l7-7 3 3-7 7-3-3z"></path><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"></path><path d="M2 2l7.586 7.586"></path><circle cx="11" cy="11" r="2"></circle></svg>
      </button>
      <button class="tool-btn" data-tool="rect" title="Rectangle">
        <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/></svg>
      </button>
      <button class="tool-btn" data-tool="circle" title="Circle">
        <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/></svg>
      </button>
      <button class="tool-btn" data-tool="line" title="Line">
        <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="19" x2="19" y2="5"/></svg>
      </button>
      <button class="tool-btn" data-tool="arrow" title="Arrow">
        <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
      </button>
      <button class="tool-btn" data-tool="text" title="Text">
        <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 7 4 4 20 4 20 7"/><line x1="9" y1="20" x2="15" y2="20"/><line x1="12" y1="4" x2="12" y2="20"/></svg>
      </button>
    </div>

    <div class="tool-group color-picker">
      <button class="color-btn active" data-color="default" style="background: var(--text-color)" title="Default (Adapts to Theme)"></button>
      <button class="color-btn" data-color="var(--draw-red)" style="background: var(--draw-red)" title="Red"></button>
      <button class="color-btn" data-color="var(--draw-blue)" style="background: var(--draw-blue)" title="Blue"></button>
      <button class="color-btn" data-color="var(--draw-green)" style="background: var(--draw-green)" title="Green"></button>
      <button class="color-btn" data-color="var(--draw-purple)" style="background: var(--draw-purple)" title="Purple"></button>
      <button class="color-btn" data-color="var(--draw-orange)" style="background: var(--draw-orange)" title="Orange"></button>
    </div>

    <div class="tool-group">
      <button id="import-svg-btn" class="action-btn" title="Import from SVG Code">Import</button>
      <button id="undo-btn" class="action-btn" title="Undo (Ctrl+Z)">
        <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" style="margin-right:4px;"><polyline points="9 14 4 9 9 4"/><path d="M20 20v-7a4 4 0 0 0-4-4H4"/></svg> Undo
      </button>
      <button id="copy-svg-btn" class="action-btn primary" title="Copy SVG to Clipboard">Copy SVG</button>
      <button id="clear-svg-btn" class="action-btn" title="Clear Canvas">Clear</button>
    </div>
  </div>

  <div class="canvas-wrapper">
    <svg id="draw-canvas" xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" preserveAspectRatio="xMidYMid meet">
      <!-- Defs for arrowheads -->
      <defs>
        <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
          <polygon points="0,0 10,3.5 0,7" fill="currentColor" />
        </marker>
      </defs>
    </svg>
  </div>
</div>

<div id="import-modal" class="modal-overlay" style="display:none;">
  <div class="modal-content">
    <h3>Import SVG</h3>
    <textarea id="import-svg-text" placeholder="Paste your <svg> code here..." rows="12"></textarea>
    <div class="modal-actions">
      <button id="import-cancel-btn" class="action-btn">Cancel</button>
      <button id="import-confirm-btn" class="action-btn primary">Import into Canvas</button>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/js/draw.js"></script>
{% endblock %}
