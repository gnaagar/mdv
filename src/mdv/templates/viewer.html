{% extends "base.html" %}

{% block styles %}
<link rel="stylesheet" href="/static/viewer.css?v=20260327a">
{% endblock %}

{% block scripts %}
<script src="/static/js/viewer.js?v=20260327a"></script>
{% endblock %}

{% block body %}
  <div class="container">
    <!-- Left Nav Sidebar -->
    <div class="nav-sidebar">
      <div class="sidebar-top-header">
        <a href="/" class="header-btn" title="Home">
          <img src="/static/logo.png" alt="Logo" class="app-logo" width="24" height="24">
        </a>
        <button id="btn-dir-explorer" class="header-btn" title="Directory Explorer">
          <svg fill="currentColor" viewBox="0 0 16 16" width="18" height="18"><path d="M1.75 1A1.75 1.75 0 0 0 0 2.75v10.5C0 14.216.784 15 1.75 15h12.5A1.75 1.75 0 0 0 16 13.25v-8.5A1.75 1.75 0 0 0 14.25 3H7.543L5.903 1.222A.25.25 0 0 0 5.72 1.15H1.75Z"></path></svg>
        </button>
        <button id="btn-search" class="header-btn" title="Search">
          <svg fill="currentColor" viewBox="0 0 16 16" width="18" height="18"><path d="M10.68 11.74a6 6 0 0 1-7.922-8.982 6 6 0 0 1 8.982 7.922l3.04 3.04a.749.749 0 0 1-.326 1.275.749.749 0 0 1-.734-.215ZM11.5 7a4.499 4.499 0 1 0-8.997 0A4.499 4.499 0 0 0 11.5 7Z"></path></svg>
        </button>
        <button id="btn-theme-toggle" class="header-btn" title="Toggle Theme">
          <svg fill="currentColor" viewBox="0 0 16 16" width="18" height="18"><path d="M8 1.5a6.5 6.5 0 1 0 0 13 6.5 6.5 0 0 0 0-13ZM0 8a8 8 0 1 1 16 0A8 8 0 0 1 0 8Z"></path></svg>
        </button>
        <button id="btn-focus" class="header-btn" title="Focus Mode" onclick="window.location.pathname = window.location.pathname.replace('/v/', '/m/')">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>
        </button>
      </div>
      
      <div id="toc-container"></div>
    </div>
  
    <!-- Main Content -->
    <div class="section-main" id="section-main">
      <div id="page-message" class="muted-message"></div>
      <div id="markdown-body">{{ content | safe }}</div>
    </div>
  </div>
  
  <!-- Modals -->
  <div id="modal-overlay" class="modal-overlay hidden"></div>
  
  <!-- Directory Explorer Modal -->
  <div id="dir-modal" class="modal-box hidden">
    <div class="modal-header">
      <input type="text" id="dir-filter-input" placeholder="Filter directories..." autocomplete="off">
    </div>
    <div id="dtree-container" class="modal-body"></div>
  </div>
  
  <!-- Search Modal -->
  <div id="search-modal" class="modal-box hidden">
    <div class="modal-header">
      <input type="text" id="search-input" placeholder="Search content..." autocomplete="off">
    </div>
    <div id="search-category-bar" class="search-category-bar">
      <button class="search-cat-pill active" data-category="heading" title="Headings">
        <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><path d="M3 2h2v5h6V2h2v12h-2V9H5v5H3V2z"/></svg>
        <span>Headings</span>
      </button>
      <button class="search-cat-pill active" data-category="code" title="Code blocks">
        <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><path d="M4.708 5.578L2.061 8.224l2.647 2.646-.708.708L.293 7.87l.354-.354 3.354-3.354.707.708zm6.584 0l2.647 2.646-2.647 2.646.708.708L15.707 7.87l-.354-.354-3.354-3.354-.707.708zM8.956 3.26l-2 10 .976.194 2-10-.976-.194z"/></svg>
        <span>Code</span>
      </button>
      <button class="search-cat-pill active" data-category="text" title="Paragraphs">
        <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><path d="M2 3h12v1H2V3zm0 3h10v1H2V6zm0 3h12v1H2V9zm0 3h8v1H2v-1z"/></svg>
        <span>Text</span>
      </button>
      <button class="search-cat-pill active" data-category="link" title="Links">
        <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><path d="M7.775 3.275a.75.75 0 001.06 1.06l1.25-1.25a2 2 0 112.83 2.83l-2.5 2.5a2 2 0 01-2.83 0 .75.75 0 00-1.06 1.06 3.5 3.5 0 004.95 0l2.5-2.5a3.5 3.5 0 00-4.95-4.95l-1.25 1.25zm-.025 9.45a.75.75 0 01-1.06-1.06l-1.25 1.25a2 2 0 11-2.83-2.83l2.5-2.5a2 2 0 012.83 0 .75.75 0 001.06-1.06 3.5 3.5 0 00-4.95 0l-2.5 2.5a3.5 3.5 0 004.95 4.95l1.25-1.25z"/></svg>
        <span>Links</span>
      </button>
      <button class="search-cat-pill active" data-category="list" title="Lists">
        <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><path d="M2 4a1 1 0 100-2 1 1 0 000 2zm3.75-1.5a.75.75 0 000 1.5h8.5a.75.75 0 000-1.5h-8.5zm0 5a.75.75 0 000 1.5h8.5a.75.75 0 000-1.5h-8.5zm0 5a.75.75 0 000 1.5h8.5a.75.75 0 000-1.5h-8.5zM3 8a1 1 0 11-2 0 1 1 0 012 0zm-1 6a1 1 0 100-2 1 1 0 000 2z"/></svg>
        <span>Lists</span>
      </button>
      <button id="search-cat-invert" class="search-cat-invert" title="Invert selection">
        <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><path d="M5.22 14.78a.75.75 0 001.06-1.06L4.56 12h8.69a.75.75 0 000-1.5H4.56l1.72-1.72a.75.75 0 00-1.06-1.06l-3 3a.75.75 0 000 1.06l3 3zm5.56-6.5a.75.75 0 11-1.06-1.06l1.72-1.72H2.75a.75.75 0 010-1.5h8.69L9.72 2.28a.75.75 0 011.06-1.06l3 3a.75.75 0 010 1.06l-3 3z"/></svg>
      </button>
    </div>
    <div id="search-results" class="modal-body">
      <div class="search-results-body">
        <ul class="search-column-content" id="search-results-content" style="width: 100%;"></ul>
      </div>
    </div>
  </div>
{% endblock %}
