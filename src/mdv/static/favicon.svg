<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#252838"/>
      <stop offset="100%" stop-color="#191b28"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect x="4" y="4" width="92" height="92" rx="20" fill="url(#bg)"/>
  <!-- Subtle top highlight for depth -->
  <rect x="4" y="4" width="92" height="46" rx="20" fill="rgba(255,255,255,0.04)"/>
  <!-- Border -->
  <rect x="4" y="4" width="92" height="92" rx="20" fill="none" stroke="rgba(255,255,255,0.14)" stroke-width="1.5"/>
  <!-- md monogram: m in soft white, d in accent blue -->
  <text x="50" y="50"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
        font-size="48"
        font-weight="500"
        text-anchor="middle"
        dominant-baseline="central">
    <tspan fill="#cdd6f4">m</tspan><tspan fill="#89b4fa">d</tspan>
  </text>
</svg>
