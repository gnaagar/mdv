<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#252838"/>
      <stop offset="100%" stop-color="#191b28"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect x="4" y="4" width="92" height="92" rx="20" fill="url(#bg)"/>
  <!-- Subtle top highlight for depth -->
  <rect x="4" y="4" width="92" height="46" rx="20" fill="rgba(255,255,255,0.04)"/>
  <!-- Border -->
  <rect x="4" y="4" width="92" height="92" rx="20" fill="none" stroke="rgba(255,255,255,0.14)" stroke-width="1.5"/>
  <!-- Three lines: top off-white, mid blue, bottom off-white -->
  <rect x="20" y="29" width="60" height="8" rx="4" fill="#cdd6f4"/>
  <rect x="20" y="46" width="46" height="8" rx="4" fill="#89b4fa"/>
  <rect x="20" y="63" width="28" height="8" rx="4" fill="#cdd6f4"/>
</svg>
