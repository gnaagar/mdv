<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <style>
    text {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-weight: 900;
      font-size: 85px;
      dominant-baseline: central;
      text-anchor: middle;
      fill: #222222; /* dark grey for light mode */
